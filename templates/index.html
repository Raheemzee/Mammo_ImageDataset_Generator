<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RGB → Medical AI Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin:0; padding:0; }
        body { font-family: 'Roboto', sans-serif; background-color: #121212; color: #e0e0e0; }

        header {
            background-color: #1f1f1f;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        header h1 { color: #4f46e5; font-size: 2rem; font-weight: 700; }

        main { max-width: 900px; margin: 2rem auto; padding: 1rem; background-color: #1e1e1e; border-radius: 12px; box-shadow: 0 6px 15px rgba(0,0,0,0.6); }

        form { display: flex; align-items: center; justify-content: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 2rem; }
        input[type=number], select {
            padding: 0.6rem 1rem;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: #2c2c2c;
            color: #fff;
        }
        input[type=number]::placeholder { color: #aaa; }

        button {
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            background: linear-gradient(90deg, #6366f1, #4f46e5);
            color: white;
            transition: 0.3s ease;
        }
        button:hover { background: linear-gradient(90deg, #4f46e5, #3730a3); }

        .images {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }
        .images img {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.7);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .images img:hover { transform: scale(1.05); box-shadow: 0 10px 25px rgba(0,0,0,0.8); }

        footer { text-align: center; margin-top: 2rem; font-size: 0.9rem; color: #888; }
        @media(max-width:600px){ form { flex-direction: column; gap:0.5rem; } input[type=number], select { width: 100%; } }
    </style>
</head>
<body>

<header>
    <h1>RGB → Medical AI Generator</h1>
</header>

<main>
    <form method="POST">
        <select name="model_name" required>
            <option value="" disabled selected>Select Image Type</option>
            {% for model in models %}
                <option value="{{ model }}" {% if selected_model==model %}selected{% endif %}>{{ model }}</option>
            {% endfor %}
        </select>

        <input type="number" name="num_samples" placeholder="Number of images" min="1">
        <button type="submit">Generate</button>
    </form>

    {% if image_paths %}
    <div class="images">
        {% for path in image_paths %}
            <img src="{{ url_for('view_image', filename=path.split('/')[-1]) }}" alt="Generated Image">
        {% endfor %}
    </div>
    {% endif %}
</main>

<footer>
    &copy; 2026 RGB → Medical AI Generator
</footer>

</body>
</html>
