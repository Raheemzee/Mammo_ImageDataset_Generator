<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MedAI Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin:0; padding:0; }

body {
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: #e2e8f0;
    min-height: 100vh;
}

/* HEADER */
header {
    text-align: center;
    padding: 2rem;
}
header h1 {
    font-size: 2.3rem;
    background: linear-gradient(90deg, #6366f1, #22d3ee);
    -webkit-background-clip: text;
    color: transparent;
}

/* CARD */
main {
    max-width: 900px;
    margin: auto;
    padding: 2rem;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

/* FORM */
form {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 2rem;
}

select, input {
    padding: 0.7rem 1rem;
    border-radius: 10px;
    border: none;
    background: #1e293b;
    color: white;
}

button {
    padding: 0.7rem 1.6rem;
    border-radius: 10px;
    border: none;
    font-weight: 600;
    cursor: pointer;
    background: linear-gradient(90deg, #6366f1, #22d3ee);
    color: white;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #6366f1;
}

/* GRID */
.images {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem;
}

/* IMAGE CARD */
.card {
    overflow: hidden;
    border-radius: 12px;
    background: #020617;
    transition: 0.3s;
}

.card img {
    width: 100%;
    display: block;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 30px rgba(0,0,0,0.8);
}

/* ERROR */
.error {
    text-align: center;
    color: #f87171;
    margin-bottom: 1rem;
}

/* FOOTER */
footer {
    text-align: center;
    margin-top: 2rem;
    color: #64748b;
}

</style>
</head>

<body>

<header>
    <h1>MedAI Mammogram Generator</h1>
</header>

<main>

<form method="POST">
    <select name="model_name" required>
        <option value="" disabled selected>Select Type</option>
        {% for model in models %}
        <option value="{{ model }}" {% if selected_model==model %}selected{% endif %}>
            {{ model }}
        </option>
        {% endfor %}
    </select>

    <input type="number" name="num_samples" placeholder="Images (1–10)" min="1" max="10">

    <button type="submit">Generate</button>
</form>

{% if error_message %}
<div class="error">{{ error_message }}</div>
{% endif %}

{% if image_paths %}
<div class="images">
    {% for filename in image_paths %}
    <div class="card">
        <img src="{{ url_for('view_image', filename=filename) }}">
    </div>
    {% endfor %}
</div>
{% endif %}

</main>

<footer>
    © 2026 MedAI Generator
</footer>

</body>
</html>
